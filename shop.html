<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidHub — BedWars Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #7B5EFF;
    --c2: #00E5FF;
    --bg: #050510;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
  }
  .orb1 { width: 500px; height: 500px; background: rgba(123,94,255,0.14); top: -180px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(0,229,255,0.08); bottom: -120px; right: -80px; }

  .grid-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  canvas#starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── NAV ── */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    background: rgba(5,5,16,0.6);
  }
  .nav-left { display: flex; align-items: center; gap: 24px; }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.4); font-size: 13px;
    text-decoration: none; transition: color 0.2s;
    background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .nav-back:hover { color: #fff; }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 18px; letter-spacing: 4px;
    background: linear-gradient(90deg, var(--c1), var(--c2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-ip {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 30px; padding: 7px 16px;
    font-size: 12px; color: rgba(255,255,255,0.4);
  }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00E5FF; box-shadow: 0 0 8px #00E5FF;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── HEADER ── */
  .shop-header {
    position: relative; z-index: 5;
    text-align: center; padding: 60px 24px 40px;
  }
  .mode-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 30px; padding: 8px 20px;
    font-size: 11px; font-weight: 500; letter-spacing: 2px;
    color: #00E5FF; text-transform: uppercase;
    margin-bottom: 22px;
    animation: fadeUp 0.6s ease both;
  }
  .mode-pill svg { width: 14px; height: 14px; }
  .shop-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 800; letter-spacing: -2px;
    color: #fff; margin-bottom: 10px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .shop-header p {
    font-size: 15px; color: rgba(255,255,255,0.3);
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* ── NICK ── */
  .nick-section {
    position: relative; z-index: 5;
    display: flex; justify-content: center; padding: 0 24px 44px;
    animation: fadeUp 0.6s 0.25s ease both;
  }
  .nick-wrap {
    display: flex; align-items: center; gap: 0;
    width: 100%; max-width: 380px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 16px; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .nick-wrap:focus-within {
    border-color: rgba(123,94,255,0.6);
    box-shadow: 0 0 0 4px rgba(123,94,255,0.1);
  }
  .nick-icon {
    padding: 14px 10px 14px 16px; color: rgba(255,255,255,0.25); flex-shrink: 0;
  }
  .nick-icon svg { width: 18px; height: 18px; display: block; }
  .nick-wrap input {
    flex: 1; background: none; border: none; outline: none;
    color: #fff; font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    padding: 16px 16px 16px 6px;
  }
  .nick-wrap input::placeholder { color: rgba(255,255,255,0.2); }

  /* ── GRID ── */
  .items-section {
    position: relative; z-index: 5;
    max-width: 960px; margin: 0 auto; padding: 0 32px 80px;
  }
  .items-label {
    font-size: 11px; font-weight: 500; letter-spacing: 3px;
    color: rgba(255,255,255,0.2); text-transform: uppercase;
    margin-bottom: 20px;
  }
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ── CARD ── */
  .item-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px; overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .item-card:hover {
    transform: translateY(-6px);
    border-color: rgba(123,94,255,0.35);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(123,94,255,0.1);
  }

  .card-inner { padding: 24px 24px 0; }

  .card-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.18);
    border-radius: 20px; padding: 5px 12px;
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    color: #00E5FF; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #00E5FF; flex-shrink:0; }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    color: #e8eeff; margin-bottom: 8px;
  }
  .card-desc {
    font-size: 13px; color: rgba(255,255,255,0.3);
    line-height: 1.6; margin-bottom: 22px;
  }

  /* glow line decoration */
  .card-line {
    height: 1px;
    background: linear-gradient(90deg, rgba(123,94,255,0.5), rgba(0,229,255,0.3), transparent);
    margin: 0 -24px;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    background: rgba(0,0,0,0.15);
  }
  .card-price {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -1px;
  }
  .card-price-cur {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.3);
    margin-left: 5px; vertical-align: middle;
  }

  .buy-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #7B5EFF, #5b7fff);
    color: #fff; border: none; cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    padding: 13px 26px; border-radius: 12px;
    transition: transform 0.15s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .buy-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .buy-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 24px rgba(123,94,255,0.5);
  }
  .buy-btn:active { transform: scale(0.97); }
  .buy-btn:disabled {
    opacity: 0.45; cursor: not-allowed;
    transform: none !important; box-shadow: none !important;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(10,10,30,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 14px 26px;
    font-size: 13px; color: #e8eeff;
    z-index: 999; opacity: 0;
    transition: all 0.3s; pointer-events: none;
    backdrop-filter: blur(12px);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: rgba(255,80,80,0.4); color: #ff9090; }
  .toast.ok  { border-color: rgba(0,229,255,0.3); color: #00E5FF; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── COMING SOON ── */
  .coming {
    position: relative; z-index: 5;
    max-width: 960px; margin: 0 auto;
    padding: 0 32px 60px;
  }
  .coming-label {
    font-size: 11px; font-weight: 500; letter-spacing: 3px;
    color: rgba(255,255,255,0.15); text-transform: uppercase; margin-bottom: 20px;
  }
  .coming-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .coming-chip {
    padding: 10px 20px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    font-size: 13px; color: rgba(255,255,255,0.2);
    display: flex; align-items: center; gap: 8px;
  }
  .coming-chip-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  @media(max-width:600px){
    nav{padding:16px 20px;}
    .items-section{padding:0 16px 60px;}
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="grid-lines"></div>
<canvas id="starfield"></canvas>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      Назад
    </a>
    <div class="nav-divider"></div>
    <div class="nav-logo">VOIDHUB</div>
  </div>
  <div class="nav-ip">
    <div class="nav-dot"></div>
    voidhub.graj.today
  </div>
</nav>

<div class="shop-header">
  <div class="mode-pill">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 2L4 7h3l-1 7 6-8H9L11 2z"/>
    </svg>
    BedWars
  </div>
  <h2>Магазин BedWars</h2>
  <p>Выбери привилегию · Введи ник · Оплати</p>
</div>

<div class="nick-section">
  <div class="nick-wrap">
    <div class="nick-icon">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="9" cy="6" r="3.5"/>
        <path d="M2 16c0-3.866 3.134-6 7-6s7 2.134 7 6"/>
      </svg>
    </div>
    <input id="username" placeholder="Введите ваш Minecraft ник..." autocomplete="off"/>
  </div>
</div>

<div class="items-section">
  <div class="items-label">Привилегии · BedWars</div>
  <div class="items-grid">

    <div class="item-card">
      <div class="card-inner">
        <div class="card-badge">
          <div class="badge-dot"></div>
          Титул
        </div>
        <div class="card-name">Бедварсер</div>
        <div class="card-desc">
          Красивый уникальный титул в чате — покажи всем, кто здесь главный на арене
        </div>
      </div>
      <div class="card-line"></div>
      <div class="card-footer">
        <div class="card-price">$1.00<span class="card-price-cur">USD</span></div>
        <button class="buy-btn" onclick="buy(7380254, this)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="6" cy="13.5" r="1"/><circle cx="12" cy="13.5" r="1"/>
            <path d="M1 1.5h2.5l1.5 8h8l1.5-6H4.5"/>
          </svg>
          Купить
        </button>
      </div>
    </div>

  </div>
</div>

<div class="coming">
  <div class="coming-label">Скоро в магазине</div>
  <div class="coming-grid">
    <div class="coming-chip"><div class="coming-chip-dot"></div>Ранги</div>
    <div class="coming-chip"><div class="coming-chip-dot"></div>Скины трейлы</div>
    <div class="coming-chip"><div class="coming-chip-dot"></div>Эффекты смерти</div>
    <div class="coming-chip"><div class="coming-chip-dot"></div>Флаги</div>
    <div class="coming-chip"><div class="coming-chip-dot"></div>SkyWars привилегии</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://voidhub-b-5lum.onrender.com";

/* Stars */
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function initStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      offset: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.003 + 0.001
    });
  }
}
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() / 1000;
  stars.forEach(s => {
    const a = 0.1 + 0.5 * (0.5 + 0.5 * Math.sin(t * s.speed * 10 + s.offset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
resize(); initStars(); draw();
window.addEventListener('resize', () => { resize(); initStars(); });

/* Toast */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3500);
}

/* Buy */
async function buy(pkgId, btn) {
  const u = document.getElementById('username').value.trim();
  if (!u) { showToast('Введи ник перед покупкой!', 'err'); return; }

  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .8s linear infinite">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    Загрузка...`;

  try {
    const res = await fetch(API + '/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, packageId: pkgId })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    if (data.url) {
      showToast('Переход к оплате...', 'ok');
      setTimeout(() => window.location.href = data.url, 600);
    } else throw new Error('Сервер не вернул ссылку');
  } catch (e) {
    showToast('Ошибка: ' + e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}
</script>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
</body>
</html>
