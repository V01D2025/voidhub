<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VoidHub Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at 50% 0%, #1f2a5a, #050510);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 70px 20px 30px;
}

h1 {
  font-size: 48px;
  margin: 0;
  background: linear-gradient(90deg,#7cf7ff,#6c5cff);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #aaa;
}

/* IP */
.ip {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 25px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #7cf7ff;
}

/* INPUT */
.input {
  display: flex;
  justify-content: center;
  margin: 40px;
}

input {
  padding: 14px;
  width: 260px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: center;
  outline: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 25px;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 40px rgba(124,247,255,0.2);
}

.card h2 {
  margin: 0;
}

.price {
  color: #7cf7ff;
  margin: 10px 0;
  font-weight: 700;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(90deg,#7cf7ff,#6c5cff);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 20px;
  color: #7cf7ff;
}
</style>
</head>

<body>

<header>
  <h1>VOIDHUB</h1>
  <p>Донат-магазин Minecraft сервера</p>
  <div class="ip">IP: voidhub.graj.today</div> <!-- можешь поменять -->
</header>

<div class="input">
  <input id="username" placeholder="Введите ник">
</div>

<div class="grid">

  <div class="card">
    <h2>Титул "Бедварсер"</h2>
    <div class="price">$1.00</div>
    <p>Красивый титул в чате</p>

    <!-- ВАЖНО: ВСТАВЬ СВОЙ packageId -->
    <button onclick="buy(7380254, this)">Купить</button>
  </div>

</div>

<div class="loader" id="loader">Создание покупки...</div>

<script>
/* 🔴 ВСТАВЬ СВОЙ BACKEND */
const API = "https://voidhub-b.onrender.com";

async function buy(packageId, btn) {
  const username = document.getElementById("username").value.trim();
  const loader = document.getElementById("loader");

  if (!username) {
    alert("Введи ник!");
    return;
  }

  btn.disabled = true;
  loader.style.display = "block";

  try {
    const res = await fetch(API + "/create-checkout", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username,
        packageId: packageId
      })
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }

    const data = await res.json();
    console.log("Ответ:", data);

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Ошибка: backend не вернул ссылку");
    }

  } catch (err) {
    console.error(err);
    alert("Ошибка: " + err.message);
  }

  btn.disabled = false;
  loader.style.display = "none";
}
</script>

</body>
</html>
